name: CodeQL

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  codeql:
    runs-on: ubuntu-latest

    env:
      CODEQL_RAM: 8000
      CODEQL_THREADS: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          build-mode: manual
          queries: security-extended
          config: |
            paths:
              - 6x/aplicacao/aghu_jee
            paths-ignore:
              - '**/test/**'
              - '**/target/**'
              - '**/.github/**'
              - '**/aghu-entidades/**'
              - '**/banco-dados/**'
              - '**/dependencias/**'

      # 🔥 AQUI ESTÁ O SEGREDO
      - name: Build (multi-module)
        working-directory: 6x/aplicacao/aghu_jee
        run: mvn clean compile -DskipTests

      - name: Run CodeQL
        uses: github/codeql-action/analyze@v3