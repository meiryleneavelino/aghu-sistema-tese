name: CodeQL

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main", "develop" ]

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    env:
      CODEQL_RAM: 8000
      CODEQL_THREADS: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 🔍 Descobre automaticamente onde está o pom.xml
      - name: Find pom.xml
        id: find_pom
        run: |
          POM_PATH=$(find . -name "pom.xml" | head -n 1)
          echo "Found pom at: $POM_PATH"
          DIR=$(dirname "$POM_PATH")
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          build-mode: manual
          queries: security-extended

      # 🔥 Build automático baseado no pom encontrado
      - name: Build project
        working-directory: ${{ steps.find_pom.outputs.dir }}
        run: mvn clean install -DskipTests -Dmaven.javadoc.skip=true -B -V

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3