name: CodeQL Java

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  analyze:
    name: Analyze (Java)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          build-mode: none   # 🔥 AQUI está o segredo

      # ❌ NÃO roda Maven (evita erro de dependência)
      # - name: Build
      #   run: mvn clean install

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3