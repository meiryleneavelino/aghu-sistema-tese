name: CodeQL

on:
  push:
    branches: [ "master", "main", "develop" ]

jobs:
  codeql:
    runs-on: ubuntu-latest

    env:
      CODEQL_RAM: 8000
      CODEQL_THREADS: 2

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          build-mode: manual
          queries: security-extended

      # 🔥 BUILD RESILIENTE
      - name: Build project
        run: mvn clean compile -DskipTests -Dmaven.javadoc.skip=true -fn -B

      - name: Analyze
        uses: github/codeql-action/analyze@v3