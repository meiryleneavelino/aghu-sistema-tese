name: CodeQL Java

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      # 🔥 BUILD REAL (módulo que compila)
      - name: Build aghu-entidades
        working-directory: 6x/aplicacao/aghu_jee/aghu-entidades
        run: |
          mvn -B \
          -DskipTests \
          -Dmaven.test.skip=true \
          -Dcheckstyle.skip=true \
          -Dpmd.skip=true \
          -Denforcer.skip=true \
          compile

      # (opcional mas recomendado)
      - name: Debug classes
        run: find . -name "*.class" | head -20

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3