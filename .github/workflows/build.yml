name: SonarCloud
on:
  push:
    branches: [master, main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # 5GB é o limite seguro para o runner padrão do GitHub (que tem 7GB total)
          SONAR_SCANNER_OPTS: -Xmx5120m -XX:+UseG1GC
        with:
          args: >
            -Dsonar.projectKey=meiryleneavelino_aghu-sistema-tese
            -Dsonar.organization=meiryleneavelino
            -Dsonar.sources=6x/aplicacao/aghu_jee
            -Dsonar.java.binaries=.
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=**/test/**,**/target/**,**/.github/**,**/*.xhtml,**/banco-dados/**,**/dependencias/**,**/.settings/**,**/.project,**/.classpath
            -Dsonar.cpd.exclusions=**/*.xhtml