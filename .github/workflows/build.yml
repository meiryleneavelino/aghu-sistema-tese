name: SonarCloud
on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Define o limite de memória para 4GB para evitar o java.lang.OutOfMemoryError
          SONAR_SCANNER_OPTS: -Xmx4096m
        with:
          args: >
            -Dsonar.projectKey=meiryleneavelino_aghu-sistema-tese
            -Dsonar.organization=meiryleneavelino
            -Dsonar.sources=.
            -Dsonar.java.binaries=.
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=**/test/**,**/target/**,**/.github/**,**/node_modules/**,**/*.xhtml
            -Dsonar.cpd.exclusions=**/*.xhtml