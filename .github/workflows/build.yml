name: SonarCloud
on:
  push:
    branches: [master, main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Usamos 6GB (limite extremo do runner de 7GB) e otimizamos o gerenciamento de objetos
          SONAR_SCANNER_OPTS: >
            -Xmx6g 
            -XX:+UseG1GC 
            -XX:MaxGCPauseMillis=200 
            -XX:ParallelGCThreads=2 
            -Djava.awt.headless=true
        with:
          args: >
            -Dsonar.projectKey=meiryleneavelino_aghu-sistema-tese
            -Dsonar.organization=meiryleneavelino
            -Dsonar.sources=6x/aplicacao/aghu_jee/aghu-core
            -Dsonar.java.binaries=.
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=**/test/**,**/target/**,**/.github/**,**/*.xhtml,**/aghu-entidades/**,**/dependencias/**,**/banco-dados/**
            -Dsonar.java.dataflow.activated=false
            -Dsonar.cpd.exclusions=**/*