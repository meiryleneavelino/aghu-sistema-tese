name: SonarCloud
on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # O comando abaixo agora aponta para a pasta 'source'
        #run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f source/pom.xml -Dsonar.projectKey=meiryleneavelino_aghu-sistema-tese -Dsonar.organization=meiryleneavelino
        run: mvn -B sonar:sonar -f source/pom.xml -Dsonar.projectKey=meiryleneavelino_aghu-sistema-tese -Dsonar.organization=meiryleneavelino -Dmaven.test.skip=true -Dcheckstyle.skip=true