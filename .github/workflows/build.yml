name: SonarCloud
on:
  push:
    branches: [master, main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # Usamos 5GB para deixar 2GB livres para o sistema/Node do Sonar
          SONAR_SCANNER_OPTS: >
            -Xmx5g 
            -XX:+UseG1GC 
            -Djava.awt.headless=true
        with:
          args: >
            -Dsonar.projectKey=meiryleneavelino_aghu-sistema-tese
            -Dsonar.organization=meiryleneavelino
            -Dsonar.sources=6x/aplicacao/aghu_jee
            -Dsonar.java.binaries=.
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=**/test/**,**/target/**,**/.github/**,**/*.xhtml,**/aghu-entidades/**,**/banco-dados/**,**/dependencias/**
            -Dsonar.cpd.exclusions=**/*
            -Dsonar.java.dataflow.activated=false