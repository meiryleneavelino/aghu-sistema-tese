- name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # 5GB is great, G1GC helps manage that memory efficiently
          SONAR_SCANNER_OPTS: >
            -Xmx5g 
            -XX:+UseG1GC 
            -Djava.awt.headless=true
        with:
          args: >
            -Dsonar.projectKey=meiryleneavelino_aghu-sistema-tese
            -Dsonar.organization=meiryleneavelino
            -Dsonar.sources=6x/aplicacao/aghu_jee
            -Dsonar.java.binaries=**/target/classes,**/build/classes
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=**/test/**,**/target/**,**/.github/**,**/*.xhtml,**/aghu-entidades/**,**/banco-dados/**,**/dependencias/**
            -Dsonar.cpd.exclusions=**/*
            -Dsonar.java.dataflow.activated=false