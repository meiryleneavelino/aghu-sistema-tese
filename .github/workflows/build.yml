jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # O AGHU é grande, precisamos compilar para gerar os .class
      - name: Compile with Maven
        run: mvn clean compile -DskipTests

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_SCANNER_OPTS: >
            -Xmx4g
            -XX:+UseG1GC
            -Djava.awt.headless=true
        with:
          args: >
            -Dsonar.projectKey=meiryleneavelino_aghu-sistema-tese
            -Dsonar.organization=meiryleneavelino
            -Dsonar.sources=6x/aplicacao/aghu_jee
            -Dsonar.java.binaries=**/target/classes
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.exclusions=**/test/**,**/target/**,**/.github/**,**/*.xhtml,**/aghu-entidades/**,**/banco-dados/**,**/dependencias/**
            -Dsonar.cpd.exclusions=**/*
            -Dsonar.java.dataflow.activated=false